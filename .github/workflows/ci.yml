name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: dagger check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Dagger checks
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: v0.21.7
          args: --failfast
          check: "**"

  dylint:
    name: dylint lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustc-dev, llvm-tools

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install dylint tools
        run: |
          cargo binstall cargo-dylint dylint-link --no-confirm || cargo install cargo-dylint dylint-link

      - name: Build and test lint crate
        run: cargo test -p otel-wasi-dylint

      - name: Run dylint on workspace (dogfood)
        run: cargo dylint --all --workspace -- --all-targets
