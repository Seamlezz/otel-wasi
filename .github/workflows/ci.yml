name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: dagger check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Dagger checks
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: v0.21.7
          args: --failfast
          check: "**"

  cargo-version-changes:
    name: cargo version changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Cargo version changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          changed=false
          if [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            if [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="${{ github.sha }}^"
            fi

            before=$(git show "$base:Cargo.toml" 2>/dev/null | python3 -c 'import sys, tomllib; data = tomllib.loads(sys.stdin.read() or ""); print(data.get("workspace", {}).get("package", {}).get("version", ""))' || true)
            after=$(python3 -c 'import tomllib; data = tomllib.loads(open("Cargo.toml", "rb").read().decode()); print(data.get("workspace", {}).get("package", {}).get("version", ""))')

            if [ "$before" != "$after" ]; then
              changed=true
            fi
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

  publish:
    name: publish crates
    runs-on: ubuntu-latest
    needs:
      - check
      - cargo-version-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.cargo-version-changes.outputs.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish unpublished workspace crates
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: v0.21.7
          call: publish --token env://CRATES_IO_TOKEN
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
