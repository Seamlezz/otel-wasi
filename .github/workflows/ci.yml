name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: dagger check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Dagger checks
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: v0.21.7
          args: --failfast
          check: "**"
